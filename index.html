<!DOCTYPE html>
<html lang="mr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>संकल्प</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Outfit;
background:#dfe6e9;
margin:0;
padding:10px;
}

.container{
max-width:520px;
margin:auto;
display:flex;
flex-direction:column;
gap:12px;
}

.app-header{
background:linear-gradient(-45deg,#ff0000,#ff7f00,#ffff00,#00ff00,#0000ff,#4b0082,#9400d3);
background-size:400% 400%;
animation:rainbow 8s infinite;
border-radius:20px;
padding:20px;
text-align:center;
color:white;
}

@keyframes rainbow{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

.app-title{
font-size:26px;
font-weight:900;
}

.stats-row{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.stat-box{
flex:1;
text-align:center;
}

.stat-num{
font-size:20px;
font-weight:800;
}

.tabs{
display:flex;
background:white;
border-radius:14px;
padding:5px;
}

.tab{
flex:1;
padding:10px;
text-align:center;
font-weight:700;
cursor:pointer;
border-radius:10px;
}

.tab.active{
background:#6c5ce7;
color:white;
}

.glass-input{
background:white;
border-radius:18px;
padding:15px;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #dfe6e9;
}

.add-btn{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2d3436;
color:white;
font-weight:800;
cursor:pointer;
margin-top:5px;
}

.task-card{
background:white;
padding:12px;
border-radius:14px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card-done{
opacity:0.6;
text-decoration:line-through;
}

.date-title{
font-weight:800;
margin-top:15px;
color:#6c5ce7;
}

.icon-btn{
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
margin-left:5px;
}

.btn-check{background:#00b894;color:white;}
.btn-del{background:#ff7675;color:white;}

</style>

</head>

<body>

<div class="container">

<div class="app-header">

<h1 class="app-title">🚀 संकल्प</h1>

<div class="stats-row">

<div class="stat-box">
<div class="stat-num" id="stat-total">0</div>
<div>एकूण</div>
</div>

<div class="stat-box">
<div class="stat-num" id="stat-done">0</div>
<div>पूर्ण</div>
</div>

<div class="stat-box">
<div class="stat-num" id="stat-pending">0</div>
<div>बाकी</div>
</div>

</div>

</div>

<div class="tabs">

<div class="tab active" id="tabPending" onclick="switchTab('pending')">
⏳ बाकी कामे
</div>

<div class="tab" id="tabDone" onclick="switchTab('done')">
✅ इतिहास
</div>

</div>

<div class="glass-input">

<input id="personInput" placeholder="👤 नाव">

<input id="taskInput" placeholder="📝 काम">

<input type="date" id="dateInput">

<button class="add-btn" onclick="addTask()">ADD TASK</button>

<input id="search" placeholder="🔍 Search task" onkeyup="searchTask()">

<button onclick="downloadReport()" class="add-btn">
📄 Download Report
</button>

</div>

<div id="mainList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyDm85K2wDKT_uYOWndPJLOaWSudyppk8Ew",
authDomain:"task-c106f.firebaseapp.com",
projectId:"task-c106f",
storageBucket:"task-c106f.firebasestorage.app",
messagingSenderId:"569746777624",
appId:"1:569746777624:web:59b0d52ea9ed3582d4456d"

};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const tasksCol=collection(db,"tasks");

let allData=[];
let currentTab="pending";

window.switchTab=(tab)=>{

currentTab=tab;

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

if(tab==="pending"){
document.getElementById("tabPending").classList.add("active");
}else{
document.getElementById("tabDone").classList.add("active");
}

render();

};

function render(data=allData){

const list=document.getElementById("mainList");
list.innerHTML="";

let tasks=[];

if(currentTab==="pending"){
tasks=data.filter(t=>!t.completed);
}else{
tasks=data.filter(t=>t.completed);
}

tasks.sort((a,b)=>(a.date||"9999").localeCompare(b.date||"9999"));

let lastDate="";

tasks.forEach(t=>{

let date=t.date||"No Date";

if(date!==lastDate){

let d=document.createElement("div");
d.className="date-title";
d.innerText="📅 "+date;

list.appendChild(d);

lastDate=date;

}

let div=document.createElement("div");

div.className="task-card "+(t.completed?"card-done":"");

div.innerHTML=`

<div>

<strong>${t.text}</strong>

<br>

<small>${t.person}</small>

</div>

<div>

<button class="icon-btn" onclick="editTask('${t.id}','${t.text}','${t.person}')">✏️</button>

${!t.completed?`<button class="icon-btn btn-check" onclick="markDone('${t.id}')">✓</button>`:""}

<button class="icon-btn btn-del" onclick="del('${t.id}')">✕</button>

</div>

`;

list.appendChild(div);

});

updateStats();

}

function updateStats(){

let total=allData.length;
let done=allData.filter(t=>t.completed).length;
let pending=total-done;

document.getElementById("stat-total").innerText=total;
document.getElementById("stat-done").innerText=done;
document.getElementById("stat-pending").innerText=pending;

}

window.addTask=async()=>{

let person=document.getElementById("personInput").value;
let text=document.getElementById("taskInput").value;
let date=document.getElementById("dateInput").value;

if(!person||!text)return alert("नाव आणि काम भरा");

await addDoc(tasksCol,{
person:person,
text:text,
date:date,
completed:false,
createdAt:Date.now()
});

document.getElementById("taskInput").value="";

};

window.markDone=async(id)=>{

await updateDoc(doc(db,"tasks",id),{
completed:true,
completedAt:Date.now()
});

};

window.del=async(id)=>{

await deleteDoc(doc(db,"tasks",id));

};

window.editTask=async(id,oldText,oldPerson)=>{

let newText=prompt("काम बदला:",oldText);
let newPerson=prompt("नाव बदला:",oldPerson);

if(!newText||!newPerson) return;

await updateDoc(doc(db,"tasks",id),{
text:newText,
person:newPerson
});

};

window.searchTask=()=>{

let val=document.getElementById("search").value.toLowerCase();

let filtered=allData.filter(t=>
t.text.toLowerCase().includes(val)
);

render(filtered);

};

window.downloadReport=()=>{

const { jsPDF } = window.jspdf;

let doc=new jsPDF();

let doneTasks=allData.filter(t=>t.completed);

if(doneTasks.length===0){
alert("अद्याप पूर्ण कामे नाहीत");
return;
}

doc.setFontSize(18);
doc.text("Sankalp Task Report",20,20);

let y=40;

doneTasks.forEach((t,i)=>{

doc.setFontSize(12);

doc.text(
(i+1)+". "+t.text+" - "+t.person,
20,
y
);

y+=10;

});

doc.save("sankalp-report.pdf");

};

onSnapshot(tasksCol,(snap)=>{

allData=[];

snap.forEach(d=>{
allData.push({id:d.id,...d.data()});
});

render();

});

</script>

</body>
</html>
